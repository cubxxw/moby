# Moby Workflow Update Vendored Dependency

## Action

Follow the update-vendored-dependency workflow:
1. Update go.mod to specify the new dependency version.
2. Update go.sum to reflect new dependency checksums.
3. Update files under vendor/ for the dependency (e.g., JSON configs, Go files).
4. Update vendor/modules.txt.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: go.mod, go.sum, vendor/github.com/moby/profiles/seccomp/default.json

